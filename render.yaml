services:
  - type: web
    name: repomind-ai
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn repomind.wsgi:application --bind 0.0.0.0:$PORT --workers 1 --timeout 300 --preload --max-requests 50 --max-requests-jitter 10"
    plan: free
    region: oregon
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        sync: false   # You fill this in after deploy with your .onrender.com hostname
      - key: CSRF_TRUSTED_ORIGINS
        sync: false   # e.g. https://repomind-ai.onrender.com
      - key: GROQ_API_KEY
        sync: false   # Paste your Groq key in Render dashboard
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: PYTHON_VERSION
        value: "3.11.0"
