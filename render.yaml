databases:
  - name: repomind-db
    plan: free
    region: oregon

services:
  - type: web
    name: repomind-ai
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn repomind.wsgi:application --bind 0.0.0.0:$PORT --workers 1 --timeout 300 --max-requests 50 --max-requests-jitter 10"
    plan: free
    region: oregon
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: repomind-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: "repo-mind.onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://repo-mind.onrender.com"
      - key: GROQ_API_KEY
        sync: false   # Paste your Groq key in Render dashboard
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: PYTHON_VERSION
        value: "3.11.0"
