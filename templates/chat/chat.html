{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="h3">Chat: {{ repository.name }}</h1>
    <a class="btn btn-outline-secondary" href="{% url 'repository_detail' repository.id %}">Details</a>
</div>

<form method="post" class="card card-body mb-4">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="btn btn-primary" type="submit">Ask</button>
</form>

{% for message in chat_messages %}
    <div class="mb-3">
        <div class="card card-body bg-light">
            <strong>You</strong>
            <p class="mb-0">{{ message.question }}</p>
        </div>
        <div class="card card-body mt-2">
            <strong>RepoMind AI</strong>
            <p class="mb-0 white-space-pre">{{ message.answer }}</p>
        </div>
    </div>
{% empty %}
    <div class="alert alert-info">Ask a question about this repository.</div>
{% endfor %}
{% endblock %}
