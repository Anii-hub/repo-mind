{% extends "base.html" %}

{% block title %}Upload Repository — RepoMind AI{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7 col-lg-6">
        <div class="upload-card">
            <div class="upload-card-header">
                <div class="upload-icon">
                    <i class="bi bi-cloud-upload"></i>
                </div>
                <h1 class="h4 mb-1">Upload Repository</h1>
                <p class="text-muted small mb-0">Upload a ZIP file of your codebase to start chatting with it</p>
            </div>
            <div class="upload-card-body">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button class="btn btn-primary w-100 mt-3" type="submit">
                        <i class="bi bi-gear me-1"></i> Upload and Process
                    </button>
                </form>
            </div>
            
        </div>
    </div>
</div>
{% endblock %}
