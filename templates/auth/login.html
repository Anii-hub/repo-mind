{% extends "base.html" %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-logo"><i class="bi bi-braces-asterisk"></i></div>
        <h1>Welcome back</h1>
        <p class="auth-sub">Sign in to your RepoMind account</p>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button class="auth-btn" type="submit">Sign In</button>
        </form>
        <p class="auth-footer-link">No account? <a href="{% url 'register' %}">Register</a></p>
    </div>
</div>
{% endblock %}
