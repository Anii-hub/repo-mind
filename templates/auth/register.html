{% extends "base.html" %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-logo">R</div>
        <h1>Create Account</h1>
        <p class="auth-sub">Join RepoMind and explore your code with AI</p>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button class="auth-btn" type="submit">Register</button>
        </form>
        <p class="auth-footer-link">Already registered? <a href="{% url 'login' %}">Login</a></p>
    </div>
</div>
{% endblock %}
